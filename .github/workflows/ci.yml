name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Compile-only values; no production data or secrets are used in CI.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-compile-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  ml-service:
    runs-on: ubuntu-latest
    env:
      # Exercise the same authenticated service boundary used in production.
      INTERNAL_API_TOKEN: ci-internal-test-token
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ml-service/requirements.txt
            ml-service/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q
