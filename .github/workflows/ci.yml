name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/verify_thesis_readiness.py
      - run: bash -n scripts/verify_env.sh
      - name: Validate Docker Compose interpolation and service graph
        env:
          DATABASE_URL: postgresql://ci:ci@database.invalid:5432/ci
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-compile-only
          SUPABASE_KEY: ci-compile-only
          INTERNAL_API_TOKEN: ci-internal-test-token
          N8N_ENCRYPTION_KEY: ci-encryption-key-not-used-at-runtime
          FRONTEND_URL: http://localhost:3000
          IG_BRANDS_JSON: "[]"
        run: docker compose config --quiet

  powershell-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse thesis preflight script
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\scripts\thesis_preflight.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
      - name: Verify PowerShell-to-Python quote roundtrip
        shell: powershell
        run: |
          $env:DATABASE_URL = "quote-safe"
          $Code = @'
          import os
          print(os.environ["DATABASE_URL"])
          '@
          $EncodedCode = [Convert]::ToBase64String(
              [Text.Encoding]::UTF8.GetBytes($Code)
          )
          $Result = & python -c 'import base64,sys;exec(base64.b64decode(sys.argv[1]))' $EncodedCode
          if ($LASTEXITCODE -ne 0 -or ([string]$Result).Trim() -ne "quote-safe") {
            throw "PowerShell native argument roundtrip failed"
          }

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Compile-only values; no production data or secrets are used in CI.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-compile-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  ml-service:
    runs-on: ubuntu-latest
    env:
      # Exercise the same authenticated service boundary used in production.
      INTERNAL_API_TOKEN: ci-internal-test-token
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ml-service/requirements.txt
            ml-service/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: python -m pytest -q
